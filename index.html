<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Progress Tracker</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Material Symbols / Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Elements for Premium Look -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="app-container">
        
        <!-- Header & Global Progress -->
        <header class="app-header glass-panel">
            <div class="header-top">
                <div class="header-content">
                    <h1>Progress Tracker</h1>
                    <p class="subtitle">Stay on top of your modules</p>
                </div>
                <div class="mode-toggle">
                    <span class="mode-label">View</span>
                    <label class="switch">
                        <input type="checkbox" id="mode-toggle-checkbox">
                        <span class="slider round"></span>
                    </label>
                    <span class="mode-label">Edit</span>
                </div>
            </div>
            
            <div class="global-progress-container">
                <div class="progress-info">
                    <span>Overall Progress</span>
                    <span id="global-progress-text">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="global-progress-fill"></div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="courses-container" id="courses-container">
            <!-- Courses will be injected here via JS -->
        </main>

        <!-- Add Course Button -->
        <div class="add-course-wrapper edit-only">
            <button id="btn-add-course" class="btn-primary glass-btn">
                <span class="material-symbols-rounded">add</span>
                Add New Course
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
